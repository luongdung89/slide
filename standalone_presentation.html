    <style>
/* ==========================================
   DESIGN SYSTEM & CONSTANTS
   ========================================== */
:root {
    --bg-primary: #080c14;
    --bg-secondary: #0d1321;
    --bg-card: rgba(13, 21, 37, 0.7);
    --border-glass: rgba(255, 255, 255, 0.06);
    
    --text-primary: #f8fafc;
    --text-muted: #94a3b8;
    
    --color-teal: #06b6d4;
    --color-teal-glow: rgba(6, 182, 212, 0.35);
    --color-orange: #f97316;
    --color-orange-glow: rgba(249, 115, 22, 0.35);
    --color-green: #10b981;
    --color-green-glow: rgba(16, 185, 129, 0.35);
    
    --transition-smooth: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    --transition-fast: all 0.25s ease;
    
    --font-heading: 'Outfit', 'Inter', sans-serif;
    --font-body: 'Inter', sans-serif;
}

/* ==========================================
   RESET & BASE STYLES
   ========================================== */
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
}

html {
    font-size: 22px;
}

body {
    background-color: var(--bg-primary);
    color: var(--text-primary);
    font-family: var(--font-body);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

/* ==========================================
   EDITABLE TEXTBOX GLOW
   ========================================== */
[contenteditable="true"] {
    position: relative;
    cursor: text;
    transition: var(--transition-fast);
}
[contenteditable="true"]:hover {
    background: rgba(255, 255, 255, 0.02);
    border-radius: 4px;
}
[contenteditable="true"]:focus {
    outline: 2px dashed var(--color-teal);
    outline-offset: 6px;
    background: rgba(6, 182, 212, 0.05);
    border-radius: 6px;
    box-shadow: 0 0 15px rgba(6, 182, 212, 0.1);
}

/* ==========================================
   APP HEADER
   ========================================== */
.app-header {
    height: 65px;
    background-color: rgba(8, 12, 20, 0.85);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border-glass);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 30px;
    z-index: 100;
}

.logo {
    display: flex;
    align-items: center;
    gap: 12px;
    font-family: var(--font-heading);
    font-weight: 700;
    font-size: 1.15rem;
    letter-spacing: 0.5px;
}

.logo-icon {
    color: var(--color-teal);
    font-size: 1.35rem;
    filter: drop-shadow(0 0 8px var(--color-teal-glow));
    animation: pulseGlow 3s infinite ease-in-out;
}

.badge {
    background: linear-gradient(135deg, var(--color-teal), #0891b2);
    font-size: 0.65rem;
    font-weight: 800;
    padding: 2px 8px;
    border-radius: 20px;
    margin-left: 6px;
    vertical-align: middle;
    letter-spacing: 1px;
}

.period-navigator {
    display: flex;
    gap: 8px;
}

.btn-period {
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid var(--border-glass);
    color: var(--text-muted);
    font-family: var(--font-heading);
    font-weight: 600;
    font-size: 0.85rem;
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
    transition: var(--transition-fast);
}

.btn-period.active {
    background: linear-gradient(135deg, rgba(6, 182, 212, 0.15), rgba(6, 182, 212, 0.05));
    border-color: var(--color-teal);
    color: var(--color-teal);
    box-shadow: 0 0 15px rgba(6, 182, 212, 0.15);
}

.slide-indicator {
    font-family: var(--font-heading);
    font-weight: 600;
    color: var(--text-muted);
    background: rgba(255, 255, 255, 0.02);
    padding: 6px 12px;
    border-radius: 20px;
    border: 1px solid var(--border-glass);
}

#current-slide-num {
    color: var(--color-teal);
    font-weight: 800;
    font-size: 1.1rem;
}

/* ==========================================
   PROGRESS BAR
   ========================================== */
.progress-bar-container {
    height: 4px;
    background-color: rgba(255, 255, 255, 0.03);
    width: 100%;
    position: relative;
    z-index: 101;
}

.progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--color-teal), var(--color-orange));
    width: 0%;
    transition: width 0.4s cubic-bezier(0.1, 0.8, 0.2, 1);
    box-shadow: 0 0 8px var(--color-teal-glow);
}

/* ==========================================
   PRESENTATION LAYOUT
   ========================================== */
.presentation-container {
    flex: 1;
    display: flex;
    position: relative;
    overflow: hidden;
}

.slides-wrapper {
    flex: 1;
    position: relative;
    height: 100%;
}

.slide {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    opacity: 0;
    pointer-events: none;
    transform: scale(0.97) translateY(10px);
    transition: opacity 0.5s ease-out, transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 30px;
    z-index: 1;
}

.slide.active {
    opacity: 1;
    pointer-events: auto;
    transform: scale(1) translateY(0);
    z-index: 10;
}

.slide-content {
    box-sizing: border-box;
    width: 1200px;
    height: 675px;
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    transform-origin: center center;
    display: flex;
    flex-direction: column;
    justify-content: center;
    border: 2px dashed transparent;
    border-radius: 16px;
    padding: 35px 45px;
    background: rgba(8, 12, 20, 0.45);
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), inset 0 0 30px rgba(6, 182, 212, 0.03);
}

.design-mode .slide-content {
    border: 2px dashed rgba(6, 182, 212, 0.35) !important;
}

.slide-heading {
    font-family: var(--font-heading);
    font-size: 1.55rem;
    font-weight: 850;
    text-transform: uppercase;
    letter-spacing: -0.5px;
    line-height: 1.45;
    margin-bottom: 25px;
    background: linear-gradient(135deg, var(--text-primary), #cbd5e1);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    border-left: 5px solid var(--color-teal);
    padding-left: 15px;
    padding-top: 0.12em;
    padding-bottom: 0.12em;
}

.section-desc {
    color: var(--text-muted);
    font-size: 1.1rem;
    margin-bottom: 25px;
    margin-top: -15px;
}

/* ==========================================
   GLASSMORPHIC CARDS
   ========================================== */
.glass-card {
    background: var(--bg-card);
    backdrop-filter: blur(16px);
    border: 1px solid var(--border-glass);
    border-radius: 16px;
    padding: 30px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
    transition: var(--transition-smooth);
}

.glass-card:hover {
    border-color: rgba(255, 255, 255, 0.12);
    transform: translateY(-4px);
}

.glass-card.theme-teal {
    border-left: 4px solid var(--color-teal);
}
.glass-card.theme-teal:hover {
    box-shadow: 0 15px 35px rgba(6, 182, 212, 0.08);
    border-color: var(--color-teal);
}

.glass-card.theme-orange {
    border-left: 4px solid var(--color-orange);
}
.glass-card.theme-orange:hover {
    box-shadow: 0 15px 35px rgba(249, 115, 22, 0.08);
    border-color: var(--color-orange);
}

/* ==========================================
   LAYOUT: WELCOME SCREEN (P0-01)
   ========================================== */
.layout-welcome {
    align-items: center;
    text-align: center;
}
.welcome-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 15px;
    max-width: 900px;
}
.welcome-badge {
    font-family: var(--font-heading);
    font-weight: 800;
    font-size: 0.9rem;
    color: var(--color-teal);
    letter-spacing: 2px;
    background: rgba(6, 182, 212, 0.1);
    padding: 6px 18px;
    border-radius: 30px;
    border: 1px solid rgba(6, 182, 212, 0.2);
}
.welcome-title {
    font-family: var(--font-heading);
    font-size: 2.8rem;
    font-weight: 900;
    line-height: 1.45;
    letter-spacing: -2px;
    background: linear-gradient(135deg, #ffffff 40%, #94a3b8 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 0 50px rgba(6, 182, 212, 0.15);
    padding-top: 0.1em;
}
.welcome-subtitle {
    font-size: 1.6rem;
    color: var(--color-orange);
    font-weight: 700;
    font-family: var(--font-heading);
    letter-spacing: 1px;
    margin-top: 5px;
}
.welcome-subject {
    font-size: 1.2rem;
    color: var(--text-muted);
    max-width: 600px;
    margin-top: 5px;
}
.welcome-objectives {
    font-size: 1.05rem;
    color: var(--text-muted);
    background: rgba(255, 255, 255, 0.02);
    border: 1px solid var(--border-glass);
    padding: 15px 25px;
    border-radius: 12px;
    max-width: 700px;
    margin-top: 15px;
    line-height: 1.5;
}

/* 3D Sphere Graphic object */
.sphere-3d-wrapper {
    position: relative;
    width: 150px;
    height: 150px;
    margin-top: 25px;
}
.sphere-3d {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, #06b6d4, #0b1f3c 60%, #020617);
    box-shadow: 0 0 40px rgba(6, 182, 212, 0.25),
                inset -20px -20px 50px rgba(0, 0, 0, 0.8),
                inset 10px 10px 30px rgba(255, 255, 255, 0.25);
    animation: rotateSphere 20s infinite linear, floatSphere 6s infinite ease-in-out;
}

/* ==========================================
   LAYOUT: BIG QUESTION (P0-02 / END-03)
   ========================================== */
.layout-big-question {
    align-items: center;
    text-align: center;
}
.bq-wrapper {
    max-width: 900px;
    background: radial-gradient(circle at top, rgba(15, 23, 42, 0.95) 0%, rgba(8, 12, 20, 0.6) 100%);
    border: 1px solid var(--border-glass);
    border-radius: 24px;
    padding: 35px 45px;
    position: relative;
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
    display: flex;
    flex-direction: column;
    align-items: center;
}
.bq-tag {
    font-family: var(--font-heading);
    font-weight: 800;
    font-size: 0.95rem;
    color: var(--color-orange);
    letter-spacing: 2px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 25px;
}
.bq-text {
    font-family: var(--font-heading);
    font-size: 1.55rem;
    font-weight: 900;
    line-height: 1.45;
    margin-bottom: 20px;
    color: var(--text-primary);
    filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.15));
    padding-top: 0.12em;
    padding-bottom: 0.12em;
}
.bq-sub {
    color: var(--text-muted);
    font-size: 1.15rem;
}
.bq-glow-bg {
    position: absolute;
    width: 300px;
    height: 300px;
    background: radial-gradient(circle, var(--color-orange-glow) 0%, transparent 70%);
    opacity: 0.5;
    pointer-events: none;
    z-index: -1;
    filter: blur(40px);
}
/* Question Mark object */
.bq-graphic-icon {
    font-size: 4rem;
    color: var(--color-orange);
    margin-bottom: 10px;
    filter: drop-shadow(0 0 12px var(--color-orange-glow));
    animation: pulseGlow 2.5s infinite ease-in-out;
}

/* ==========================================
   LAYOUT: ROLE INTRODUCTION (P0-03)
   ========================================== */
.layout-role-intro {
    justify-content: center;
    align-items: center;
}
.role-cards-container {
    display: grid;
    grid-template-columns: 1fr 1.2fr 1.2fr;
    gap: 25px;
    margin-top: 15px;
}
.role-info-card {
    background: var(--bg-card);
    border: 1px solid var(--border-glass);
    border-radius: 16px;
    padding: 30px 24px;
    display: flex;
    flex-direction: column;
    gap: 15px;
}
.role-info-card h3 {
    font-family: var(--font-heading);
    font-size: 1.35rem;
    font-weight: 800;
    display: flex;
    align-items: center;
    gap: 12px;
}
.role-info-card.card-role-name {
    border-top: 4px solid var(--color-teal);
    align-items: center;
    justify-content: center;
    text-align: center;
}
.role-icon-box {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    background: rgba(6, 182, 212, 0.08);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.2rem;
    color: var(--color-teal);
    filter: drop-shadow(0 0 10px var(--color-teal-glow));
}
.role-badge-text {
    font-family: var(--font-heading);
    font-weight: 900;
    font-size: 1.6rem;
    color: var(--color-teal);
    letter-spacing: 0.5px;
}
.role-info-card.card-role-desc {
    border-top: 4px solid var(--color-orange);
}
.role-info-card.card-role-desc h3 {
    color: var(--color-orange);
}
.role-info-card.card-role-mission {
    border-top: 4px solid var(--color-green);
}
.role-info-card.card-role-mission h3 {
    color: var(--color-green);
}
.card-content-text {
    font-size: 1.1rem;
    line-height: 1.6;
    color: #e2e8f0;
}

/* ==========================================
   LAYOUT: STAGE INTRO (STAGE-XX)
   ========================================== */
.layout-stage-intro {
    align-items: center;
    text-align: center;
}
.stage-intro-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    max-width: 800px;
}
.stage-num-badge {
    font-family: var(--font-heading);
    font-weight: 900;
    font-size: 1.1rem;
    color: var(--color-teal);
    letter-spacing: 3px;
    background: rgba(6, 182, 212, 0.08);
    padding: 8px 24px;
    border-radius: 30px;
    border: 1px solid rgba(6, 182, 212, 0.15);
}
.stage-title {
    font-family: var(--font-heading);
    font-size: 1.9rem;
    font-weight: 900;
    line-height: 1.45;
    letter-spacing: -1px;
    background: linear-gradient(135deg, #ffffff, #cbd5e1);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    padding-top: 0.12em;
    padding-bottom: 0.12em;
}
/* Lock animation object */
.stage-lock-icon {
    font-size: 4.5rem;
    color: var(--color-teal);
    margin-top: 15px;
    filter: drop-shadow(0 0 15px var(--color-teal-glow));
    animation: lockShake 4s infinite ease-in-out;
}

/* ==========================================
   LAYOUT: ACT INTRO (ACT-01)
   ========================================== */
.layout-act-intro {
    align-items: center;
    text-align: center;
}
.act-intro-card {
    max-width: 800px;
    width: 100%;
    padding: 50px 40px;
    background: linear-gradient(135deg, rgba(13, 21, 37, 0.9) 0%, rgba(8, 12, 20, 0.5) 100%);
    border: 1px solid var(--border-glass);
    border-top: 5px solid var(--color-orange);
    border-radius: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
}
.act-intro-icon {
    font-size: 3.5rem;
    color: var(--color-orange);
    filter: drop-shadow(0 0 10px var(--color-orange-glow));
    margin-bottom: 5px;
}
.act-intro-badge {
    font-family: var(--font-heading);
    font-weight: 800;
    font-size: 0.85rem;
    color: var(--color-orange);
    letter-spacing: 2px;
}
.act-intro-title {
    font-family: var(--font-heading);
    font-size: 2.8rem;
    font-weight: 900;
    color: var(--text-primary);
}
.act-intro-goal {
    font-size: 1.2rem;
    color: var(--text-muted);
    line-height: 1.5;
    max-width: 600px;
}

/* ==========================================
   LAYOUT: ACT PREPARATION (ACT-01B)
   ========================================== */
.layout-act-prep {
    justify-content: center;
}
.prep-cards-container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 40px;
    margin-top: 15px;
    width: 100%;
    max-width: 1000px;
    align-items: stretch;
}
.prep-detail-card {
    display: flex;
    flex-direction: column;
    gap: 20px;
}
.prep-item {
    display: flex;
    flex-direction: column;
    gap: 10px;
}
.prep-item h3 {
    font-family: var(--font-heading);
    font-size: 1.2rem;
    font-weight: 800;
    display: flex;
    align-items: center;
    gap: 10px;
}
.prep-item h3 i {
    font-size: 1.35rem;
}
.prep-text {
    font-size: 1.15rem;
    color: #e2e8f0;
    line-height: 1.55;
    background: rgba(255, 255, 255, 0.02);
    border: 1px solid var(--border-glass);
    padding: 15px 20px;
    border-radius: 10px;
}
.prep-visual-panel {
    background: var(--bg-card);
    border: 1px solid var(--border-glass);
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px;
}
.prep-visual-icon {
    font-size: 6rem;
    color: var(--color-teal);
    filter: drop-shadow(0 0 15px var(--color-teal-glow));
    animation: floatSphere 5s infinite ease-in-out;
}

/* ==========================================
   LAYOUT: ACT HOW-TO (ACT-02)
   ========================================== */
.layout-act-howto {
    justify-content: center;
}
.steps-list-container {
    display: flex;
    flex-direction: column;
    gap: 15px;
    margin-top: 10px;
}
.step-item-card {
    display: flex;
    align-items: center;
    gap: 20px;
    background: var(--bg-card);
    border: 1px solid var(--border-glass);
    padding: 20px 25px;
    border-radius: 12px;
    transition: var(--transition-smooth);
}
.step-item-card:hover {
    border-color: var(--color-teal);
    transform: translateX(10px);
}
.step-badge {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background-color: var(--color-teal);
    color: var(--bg-primary);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-heading);
    font-weight: 900;
    font-size: 1.05rem;
    box-shadow: 0 0 10px var(--color-teal-glow);
    flex-shrink: 0;
}
.step-text {
    font-size: 1.15rem;
    font-weight: 500;
    color: var(--text-primary);
    line-height: 1.5;
}

/* ==========================================
   LAYOUT: ACT WORKSPACE (ACT-03)
   ========================================== */
.layout-act-workspace {
    justify-content: center;
}
.workspace-wrapper {
    display: grid;
    grid-template-columns: 1fr 220px;
    gap: 15px;
    flex: 1;
    align-items: stretch;
}
.workspace-main {
    display: flex;
    flex-direction: column;
    gap: 10px;
}
.workspace-side {
    display: flex;
    flex-direction: column;
    gap: 12px;
}
.workspace-title-bar {
    font-family: var(--font-heading);
    font-size: 1.35rem;
    font-weight: 800;
    color: var(--color-orange);
    border-bottom: 1px solid rgba(255,255,255,0.05);
    padding-bottom: 10px;
}
.workspace-card {
    background: var(--bg-card);
    border: 1px solid var(--border-glass);
    border-radius: 16px;
    padding: 25px;
    flex: 1;
    overflow-y: auto;
    font-size: 1.15rem;
    line-height: 1.6;
}

/* Story columns within workspace */
.stories-columns {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
}
.story-column {
    background: rgba(0, 0, 0, 0.2);
    border: 1px solid var(--border-glass);
    border-radius: 12px;
    padding: 12px 15px;
}
.story-column.nam-theme { border-top: 3px solid var(--color-teal); }
.story-column.lan-theme { border-top: 3px solid var(--color-orange); }
.story-column h4 {
    font-family: var(--font-heading);
    font-weight: 800;
    font-size: 1.1rem;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
}
.nam-theme h4 { color: var(--color-teal); }
.lan-theme h4 { color: var(--color-orange); }

.list-item-story {
    font-size: 0.95rem;
    margin-bottom: 5px;
    color: #e2e8f0;
    padding-left: 20px;
    position: relative;
}
.list-item-story::before {
    content: '•';
    position: absolute;
    left: 5px;
    font-weight: bold;
}
.nam-theme .list-item-story::before { color: var(--color-teal); }
.lan-theme .list-item-story::before { color: var(--color-orange); }

.workspace-questions-card {
    background: var(--bg-card);
    border: 1px solid var(--border-glass);
    border-left: 4px solid var(--color-orange);
    border-radius: 12px;
    padding: 10px 15px;
}
.workspace-questions-card h4 {
    font-family: var(--font-heading);
    font-weight: 800;
    font-size: 1.05rem;
    color: var(--color-orange);
    margin-bottom: 5px;
}
.workspace-questions-card ul {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 5px;
}
.workspace-questions-card li {
    font-size: 1rem;
    color: var(--text-primary);
    padding-left: 15px;
    position: relative;
}
.workspace-questions-card li::before {
    content: '?';
    position: absolute;
    left: 0;
    color: var(--color-orange);
    font-weight: 800;
}

/* Card Sorting specific workspace */
.sorting-preview {
    display: flex;
    flex-direction: column;
    gap: 20px;
}
.sorting-cards-flex {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    background: rgba(0,0,0,0.15);
    padding: 15px;
    border-radius: 8px;
    border: 1px dashed var(--border-glass);
}
.sorting-tag {
    background: var(--bg-primary);
    border: 1px solid var(--border-glass);
    color: var(--text-primary);
    padding: 8px 16px;
    border-radius: 6px;
    font-weight: 700;
    font-size: 0.9rem;
    box-shadow: 0 4px 10px rgba(0,0,0,0.15);
}

/* Drawing Board placeholder */
.drawing-placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    min-height: 250px;
    border: 2px dashed rgba(255, 255, 255, 0.08);
    border-radius: 12px;
    background: rgba(0,0,0,0.1);
    gap: 15px;
}
.drawing-placeholder i {
    font-size: 4rem;
    color: var(--color-teal);
    filter: drop-shadow(0 0 10px var(--color-teal-glow));
}
.drawing-placeholder p {
    font-size: 1.1rem;
    color: var(--text-muted);
}

/* Workspace Timers (Sleeker and smaller to prevent overflow) */
.workspace-timer-widget {
    background: var(--bg-card);
    border: 1px solid var(--border-glass);
    border-radius: 12px;
    padding: 8px 10px;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    width: 100%;
}
.ws-timer-label {
    font-family: var(--font-heading);
    font-size: 0.7rem;
    font-weight: 800;
    letter-spacing: 1.2px;
    color: var(--text-muted);
}
.ws-timer-display {
    font-family: var(--font-heading);
    font-size: 1.5rem;
    font-weight: 900;
    color: var(--color-orange);
    text-shadow: 0 0 8px var(--color-orange-glow);
    letter-spacing: 1px;
}

/* Timer controls buttons styles */
.timer-controls {
    display: flex;
    justify-content: center;
    gap: 8px;
    width: 100%;
}
.btn-timer {
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid var(--border-glass);
    color: var(--text-muted);
    width: 28px;
    height: 28px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 0.75rem;
    transition: all 0.25s ease;
    display: flex;
    align-items: center;
    justify-content: center;
}
.btn-timer:hover {
    background: rgba(0, 240, 255, 0.15);
    border-color: var(--color-cyan);
    color: var(--color-cyan);
    box-shadow: 0 0 8px rgba(0, 240, 255, 0.4);
}
.btn-timer.btn-start:hover {
    background: rgba(57, 255, 20, 0.15);
    border-color: #39ff14;
    color: #39ff14;
    box-shadow: 0 0 8px rgba(57, 255, 20, 0.4);
}
.btn-timer.btn-pause:hover {
    background: rgba(255, 95, 0, 0.15);
    border-color: var(--color-orange);
    color: var(--color-orange);
    box-shadow: 0 0 8px rgba(255, 95, 0, 0.4);
}

/* Workspace Step Box */
.workspace-step-box {
    background: var(--bg-card);
    border: 1px solid var(--border-glass);
    border-radius: 12px;
    padding: 12px 14px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
    text-align: left;
}
.workspace-step-title {
    font-family: var(--font-heading);
    font-size: 0.75rem;
    font-weight: 800;
    letter-spacing: 1.2px;
    color: var(--color-cyan);
    text-shadow: 0 0 8px rgba(0, 240, 255, 0.4);
}
.workspace-step-text {
    font-family: var(--font-body);
    font-size: 0.9rem;
    line-height: 1.45;
    color: var(--text-color);
}

/* ==========================================
   LAYOUT: ACT REPORT & DEBRIEF (ACT-04)
   ========================================== */
.layout-act-report {
    justify-content: center;
}
.report-cards-container {
    display: grid;
    grid-template-columns: 1fr;
    gap: 15px;
    margin-top: 10px;
}
.report-card-item {
    background: var(--bg-card);
    border: 1px solid var(--border-glass);
    border-left: 4px solid var(--color-teal);
    padding: 16px 20px;
    border-radius: 10px;
    font-size: 1.05rem;
    line-height: 1.5;
    color: var(--text-primary);
}
.report-highlight-banner {
    background: linear-gradient(135deg, rgba(249, 115, 22, 0.08), rgba(249, 115, 22, 0.02));
    border: 1.5px solid var(--color-orange);
    border-radius: 12px;
    padding: 20px 25px;
    display: flex;
    align-items: center;
    gap: 15px;
    margin-top: 20px;
}
.report-highlight-icon {
    font-size: 1.8rem;
    color: var(--color-orange);
}
.report-highlight-text {
    font-size: 1.2rem;
    font-weight: 750;
    color: var(--text-primary);
}

/* Matrix Table layouts */
.matrix-grid {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-top: 10px;
}
.matrix-row {
    display: grid;
    grid-template-columns: 150px 1fr 1fr;
    gap: 15px;
    align-items: stretch;
}
.matrix-row.hdr {
    background: rgba(255, 255, 255, 0.03);
    border-bottom: 2px solid var(--border-glass);
    border-radius: 8px;
    padding: 10px 15px;
    font-family: var(--font-heading);
    font-weight: 800;
    color: var(--color-teal);
    font-size: 0.95rem;
}
.matrix-cell-label {
    background: rgba(6, 182, 212, 0.05);
    border: 1px solid rgba(6, 182, 212, 0.15);
    color: var(--color-teal);
    font-family: var(--font-heading);
    font-weight: 900;
    font-size: 1.1rem;
    padding: 15px 10px;
    border-radius: 8px;
    text-align: center;
    display: flex;
    align-items: center;
    justify-content: center;
}
.matrix-cell-content {
    background: var(--bg-card);
    border: 1px solid var(--border-glass);
    border-radius: 8px;
    padding: 15px;
    font-size: 0.95rem;
    line-height: 1.45;
    display: flex;
    align-items: center;
}

/* Golden Flow layouts */
.golden-flow-wrapper {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 15px;
    margin-top: 30px;
    margin-bottom: 40px;
}
.gf-node {
    background: var(--bg-card);
    border: 1px solid var(--border-glass);
    border-bottom: 3px solid var(--color-teal);
    border-radius: 12px;
    width: 170px;
    padding: 25px 10px;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}
.gf-icon {
    width: 45px;
    height: 45px;
    border-radius: 50%;
    background: rgba(6, 182, 212, 0.08);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.25rem;
    color: var(--color-teal);
}
.gf-node h4 {
    font-family: var(--font-heading);
    font-weight: 900;
    font-size: 1.2rem;
    color: var(--text-primary);
}
.gf-arrow {
    font-size: 1.5rem;
    color: var(--text-muted);
}

/* Subject Specific Reports */
.layout-subject-report {
    justify-content: center;
}
.subject-report-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-top: 10px;
}
.subject-step-box {
    background: var(--bg-card);
    border: 1px solid var(--border-glass);
    border-radius: 12px;
    padding: 18px 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
}
.subject-step-box h4 {
    font-family: var(--font-heading);
    font-weight: 850;
    font-size: 1rem;
    display: flex;
    align-items: center;
    gap: 8px;
}
.box-nghi h4 { color: var(--color-teal); }
.box-hoi h4 { color: var(--color-orange); }
.box-kiemtra h4 { color: var(--color-teal); }
.box-lamlai h4 { color: var(--color-green); }

.box-nghi { border-left: 3px solid var(--color-teal); }
.box-hoi { border-left: 3px solid var(--color-orange); }
.box-kiemtra { border-left: 3px solid var(--color-teal); }
.box-lamlai { border-left: 3px solid var(--color-green); }

.subject-step-text {
    font-size: 0.95rem;
    line-height: 1.45;
    color: #cbd5e1;
}

/* ==========================================
   LAYOUT: ACT TRANSITION (ACT-05)
   ========================================== */
.layout-act-transition {
    align-items: center;
    text-align: center;
}
.transition-wrapper {
    max-width: 800px;
    width: 100%;
}
.transition-graphic {
    font-size: 4rem;
    color: var(--color-teal);
    filter: drop-shadow(0 0 10px var(--color-teal-glow));
    margin-bottom: 25px;
    animation: rotateSphere 25s infinite linear;
}
.transition-card {
    background: var(--bg-card);
    border: 1px solid var(--border-glass);
    border-radius: 20px;
    padding: 40px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.3);
    display: flex;
    flex-direction: column;
    gap: 25px;
}
.trans-box h4 {
    font-family: var(--font-heading);
    font-weight: 800;
    font-size: 1rem;
    letter-spacing: 1px;
    margin-bottom: 10px;
}
.trans-box-explored h4 { color: var(--color-teal); }
.trans-box-next h4 { color: var(--color-orange); }

.trans-text {
    font-size: 1.3rem;
    line-height: 1.5;
    color: var(--text-primary);
}

/* ==========================================
   LAYOUT: TỔNG KẾT KEY TAKEAWAYS (END-01)
   ========================================== */
.layout-key-takeaways {
    justify-content: center;
}
.takeaway-single-container {
    display: flex;
    flex-direction: column;
    gap: 20px;
    margin-top: 15px;
    flex: 1;
    justify-content: center;
    align-items: center;
}
.takeaway-large-card {
    background: var(--bg-card);
    border: 1.5px solid var(--color-teal);
    border-radius: 20px;
    padding: 40px;
    width: 100%;
    max-width: 900px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.4);
    display: flex;
    flex-direction: column;
    gap: 25px;
}
.takeaway-label {
    font-family: var(--font-heading);
    font-weight: 900;
    font-size: 1rem;
    color: var(--color-teal);
    letter-spacing: 1.5px;
    align-self: flex-start;
    background: rgba(6, 182, 212, 0.08);
    padding: 4px 14px;
    border-radius: 6px;
    border: 1px solid rgba(6, 182, 212, 0.15);
}
.takeaway-points-flex {
    display: flex;
    flex-direction: column;
    gap: 20px;
}
.takeaway-point-item {
    font-size: 1.25rem;
    line-height: 1.6;
    color: var(--text-primary);
    padding-left: 30px;
    position: relative;
}
.takeaway-point-item::before {
    content: '\f058'; /* FontAwesome check circle */
    font-family: 'Font Awesome 6 Free';
    font-weight: 900;
    position: absolute;
    left: 0;
    color: var(--color-teal);
}

.takeaway-quote-box {
    text-align: center;
    font-size: 2.2rem;
    font-weight: 850;
    font-family: var(--font-heading);
    color: var(--color-orange);
    filter: drop-shadow(0 0 10px var(--color-orange-glow));
    line-height: 1.4;
    padding: 20px 0;
}
.takeaway-message-text {
    text-align: center;
    font-size: 1.3rem;
    color: var(--text-muted);
    line-height: 1.5;
    max-width: 700px;
    margin: 0 auto;
}

/* ==========================================
   LAYOUT: FINAL OUTPUT SHOWCASE (END-02)
   ========================================== */
.layout-final-output {
    justify-content: center;
}
.final-output-wrapper {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 30px;
    margin-top: 15px;
    flex: 1;
    align-items: center;
}
.final-output-details {
    display: flex;
    flex-direction: column;
    gap: 20px;
}
.final-output-details h3 {
    font-family: var(--font-heading);
    font-size: 1.8rem;
    font-weight: 900;
    color: var(--color-orange);
}
.final-output-details ul {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 15px;
}
.final-output-details li {
    font-size: 1.15rem;
    line-height: 1.5;
    padding-left: 28px;
    position: relative;
}
.final-output-details li::before {
    content: '\f1b2'; /* box icon */
    font-family: 'Font Awesome 6 Free';
    font-weight: 900;
    position: absolute;
    left: 0;
    color: var(--color-orange);
}
.final-output-visual-box {
    background: var(--bg-card);
    border: 1px solid var(--border-glass);
    border-radius: 20px;
    height: 320px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.3);
}
.final-output-visual-box i {
    font-size: 5rem;
    color: var(--color-teal);
    filter: drop-shadow(0 0 15px var(--color-teal-glow));
    animation: floatSphere 6s infinite ease-in-out;
}
.final-output-visual-box p {
    font-size: 1.1rem;
    color: var(--text-muted);
}

/* ==========================================
   LAYOUT: REFLECTION & COMMITMENT (END-04 / END-05)
   ========================================== */
.layout-reflection {
    justify-content: center;
}
.reflection-grid-card {
    background: var(--bg-card);
    border: 1px solid var(--border-glass);
    border-radius: 20px;
    padding: 40px;
    margin-top: 15px;
    display: flex;
    flex-direction: column;
    gap: 25px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.3);
}
.reflection-prompt-item {
    display: flex;
    flex-direction: column;
    gap: 10px;
}
.reflection-prompt-item label {
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--color-teal);
}
.reflection-textarea-mock {
    width: 100%;
    min-height: 65px;
    background: rgba(0, 0, 0, 0.25);
    border: 1px solid var(--border-glass);
    border-radius: 8px;
    padding: 15px;
    color: var(--text-primary);
    font-size: 1.05rem;
    line-height: 1.5;
}

.commitment-end-card {
    background: var(--bg-card);
    border: 1.5px solid #eab308; /* Gold border for certificate */
    border-radius: 20px;
    padding: 20px 30px;
    margin-top: 5px;
    text-align: center;
    box-shadow: 0 15px 45px rgba(234, 179, 8, 0.06), 0 10px 30px rgba(0,0,0,0.4);
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
    overflow: hidden;
}
.cert-ribbon-widget {
    font-size: 2.2rem;
    color: #eab308;
    filter: drop-shadow(0 0 8px rgba(234,179,8,0.3));
    margin-bottom: 8px;
    animation: floatSphere 4s infinite ease-in-out;
}
.commitment-end-card h2 {
    font-family: var(--font-heading);
    font-size: 1.5rem;
    font-weight: 900;
    color: var(--text-primary);
    margin-bottom: 15px;
}
.commitments-end-list {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 8px;
    max-width: 600px;
    width: 100%;
    background: rgba(0,0,0,0.2);
    border: 1px solid var(--border-glass);
    padding: 15px 20px;
    border-radius: 12px;
    margin-bottom: 15px;
}
.commitment-item-row {
    font-size: 1rem;
    line-height: 1.4;
    text-align: left;
    display: flex;
    align-items: flex-start;
    gap: 12px;
}
.commitment-item-row i {
    font-size: 1.05rem;
    color: var(--color-teal);
    margin-top: 3px;
}

.btn-cert-sign {
    background: linear-gradient(135deg, #eab308, #ca8a04);
    color: var(--bg-primary);
    border: none;
    font-family: var(--font-heading);
    font-weight: 800;
    font-size: 1rem;
    padding: 10px 28px;
    border-radius: 30px;
    cursor: pointer;
    box-shadow: 0 5px 20px rgba(234, 179, 8, 0.2);
    display: inline-flex;
    align-items: center;
    gap: 10px;
    transition: var(--transition-fast);
}
.btn-cert-sign:hover {
    transform: scale(1.04);
    box-shadow: 0 8px 25px rgba(234, 179, 8, 0.35);
}
.btn-cert-sign:active {
    transform: scale(0.98);
}

/* Confetti particles */
.confetti-container {
    position: absolute;
    width: 100%;
    height: 100%;
    top: 0; left: 0;
    pointer-events: none;
    z-index: 100;
    overflow: hidden;
}
.confetti {
    position: absolute;
    width: 8px;
    height: 8px;
    animation: confettiFall 4s linear forwards;
}

/* ==========================================
   APP FOOTER (CONTROLS)
   ========================================== */
.app-footer {
    height: 70px;
    background-color: rgba(8, 12, 20, 0.85);
    backdrop-filter: blur(16px);
    border-top: 1px solid var(--border-glass);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 30px;
    z-index: 100;
}

.footer-left, .footer-right {
    display: flex;
    gap: 10px;
}

.btn-footer {
    background: rgba(255, 255, 255, 0.02);
    border: 1px solid var(--border-glass);
    color: var(--text-muted);
    font-family: var(--font-heading);
    font-weight: 600;
    font-size: 0.85rem;
    padding: 10px 16px;
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: var(--transition-fast);
}

.btn-footer:hover {
    background: rgba(255, 255, 255, 0.05);
    color: var(--text-primary);
}

.btn-footer.active {
    background: rgba(6, 182, 212, 0.12);
    border-color: var(--color-teal);
    color: var(--color-teal);
}

.footer-center {
    display: flex;
    align-items: center;
    gap: 20px;
}

.btn-nav {
    background: var(--bg-card);
    border: 1px solid var(--border-glass);
    color: var(--text-primary);
    width: 42px;
    height: 42px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.1rem;
    transition: var(--transition-fast);
}

.btn-nav:hover {
    background-color: var(--color-teal);
    border-color: var(--color-teal);
    color: var(--bg-primary);
    box-shadow: 0 0 15px var(--color-teal-glow);
}

.btn-nav:active {
    transform: scale(0.95);
}

.slide-title-display {
    font-family: var(--font-heading);
    font-weight: 700;
    font-size: 1.15rem;
    color: var(--text-primary);
    min-width: 250px;
    text-align: center;
}

/* ==========================================
   SIDEBAR NAVIGATION (DRAWER)
   ========================================== */
.sidebar-nav {
    position: absolute;
    top: 0;
    left: -320px;
    width: 320px;
    height: 100%;
    background-color: rgba(13, 21, 37, 0.95);
    backdrop-filter: blur(20px);
    border-right: 1px solid var(--border-glass);
    z-index: 200;
    display: flex;
    flex-direction: column;
    transition: left 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    box-shadow: 15px 0 30px rgba(0, 0, 0, 0.4);
}

.sidebar-nav.open {
    left: 0;
}

.sidebar-header {
    padding: 24px;
    border-bottom: 1px solid var(--border-glass);
    display: flex;
    align-items: center;
    justify-content: space-between;
}

.sidebar-header h3 {
    font-family: var(--font-heading);
    font-size: 1.25rem;
    font-weight: 850;
    color: var(--color-teal);
}

.btn-close-sidebar {
    background: transparent;
    border: none;
    color: var(--text-muted);
    font-size: 1.2rem;
    cursor: pointer;
    transition: var(--transition-fast);
}

.btn-close-sidebar:hover {
    color: var(--text-primary);
}

.slide-list {
    flex: 1;
    overflow-y: auto;
    list-style: none;
    padding: 15px;
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.slide-item {
    padding: 12px 16px;
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    gap: 4px;
    border: 1px solid transparent;
    transition: var(--transition-fast);
}

.slide-item:hover {
    background: rgba(255, 255, 255, 0.03);
}

.slide-item.active {
    background: rgba(6, 182, 212, 0.08);
    border-color: rgba(6, 182, 212, 0.2);
}

.slide-item-meta {
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--color-teal);
}

.slide-item-title {
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--text-primary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.slide-item.active .slide-item-title {
    color: var(--color-teal);
}

/* ==========================================

/* ==========================================
   KEYFRAME ANIMATIONS
   ========================================== */
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
}

@keyframes rotateSphere {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

@keyframes floatSphere {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
}

@keyframes pulseGlow {
    0%, 100% { opacity: 0.8; filter: drop-shadow(0 0 5px var(--color-teal-glow)); }
    50% { opacity: 1; filter: drop-shadow(0 0 15px var(--color-teal-glow)); }
}

@keyframes lockShake {
    0%, 100% { transform: translateY(0) rotate(0); }
    45% { transform: translateY(-4px) rotate(-3deg); }
    50% { transform: translateY(-4px) rotate(3deg); }
    55% { transform: translateY(0) rotate(0); }
}

@keyframes confettiFall {
    0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
}

/* ==========================================
   DESIGN MODE & DRAGGABLE OBJECTS
   ========================================== */
.design-mode .draggable-object {
    position: relative !important;
    outline: 2px dashed var(--color-teal) !important;
    outline-offset: 4px !important;
    cursor: grab !important;
    user-select: none !important;
    overflow: visible !important;
    transition: none !important;
    box-shadow: 0 0 15px rgba(6, 182, 212, 0.15) !important;
}

.design-mode .draggable-object:active {
    cursor: grabbing !important;
}

.draggable-object .drag-handle {
    display: none;
}

.design-mode .draggable-object .drag-handle {
    display: flex !important;
    position: absolute;
    top: -12px;
    right: -12px;
    width: 26px;
    height: 26px;
    background-color: var(--color-teal);
    color: var(--bg-primary);
    border-radius: 50%;
    align-items: center;
    justify-content: center;
    font-size: 0.85rem;
    cursor: move !important;
    z-index: 1000;
    box-shadow: 0 0 8px var(--color-teal-glow);
    border: 1.5px solid var(--text-primary);
}

.draggable-object .delete-handle {
    display: none;
}

.design-mode .draggable-object .delete-handle {
    display: flex !important;
    position: absolute;
    top: -12px;
    left: -12px;
    width: 26px;
    height: 26px;
    background-color: #ef4444;
    color: var(--text-primary);
    border-radius: 50%;
    align-items: center;
    justify-content: center;
    font-size: 0.8rem;
    cursor: pointer !important;
    z-index: 1000;
    box-shadow: 0 0 8px rgba(239, 68, 68, 0.5);
    border: 1.5px solid var(--text-primary);
}

.design-mode .draggable-object:hover .delete-handle {
    background-color: #dc2626;
    box-shadow: 0 0 10px rgba(239, 68, 68, 0.7);
}

.design-mode .draggable-object:hover {

}

.design-mode .glass-card:hover,
.design-mode .step-item-card:hover,

.design-mode .slide-heading,

/* ==========================================
   CUSTOM CHECKBOX FOR COMMITMENT (STAGE-08)
   ========================================== */
.checklist-interactive {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 15px;
}

.checkbox-container {
    display: flex;
    align-items: center;
    position: relative;
    padding-left: 35px;
    cursor: pointer;
    font-size: 1.1rem;
    user-select: none;
}

/* Hide default checkbox */
.checkbox-container input {
    position: absolute;
    opacity: 0;
    cursor: pointer;
    height: 0;
    width: 0;
}

/* Custom checkmark */
.checkmark {
    position: absolute;
    top: 50%;
    left: 0;
    transform: translateY(-50%);
    height: 22px;
    width: 22px;
    background-color: rgba(255, 255, 255, 0.03);
    border: 1.5px solid var(--border-glass);
    border-radius: 6px;
    transition: var(--transition-fast);
}

/* Hover style */
.checkbox-container:hover input ~ .checkmark {
    border-color: var(--color-orange);
    box-shadow: 0 0 8px var(--color-orange-glow);
}

/* Checked style */
.checkbox-container input:checked ~ .checkmark {
    background-color: var(--color-orange);
    border-color: var(--color-orange);
    box-shadow: 0 0 12px var(--color-orange-glow);
}

/* Checkmark indicator */
.checkmark::after {
    content: "";
    position: absolute;
    display: none;
}

/* Show indicator when checked */
.checkbox-container input:checked ~ .checkmark::after {
    display: block;
}

/* Style the checkmark indicator */
.checkbox-container .checkmark::after {
    left: 7px;
    top: 3px;
    width: 5px;
    height: 10px;
    border: solid var(--bg-primary);
    border-width: 0 2.5px 2.5px 0;
    transform: rotate(45deg);
}

.checkbox-container span[contenteditable="true"] {
    display: inline-block;
    color: var(--text-primary);
    line-height: 1.4;
}

/* Custom styling for the 4 golden nodes in process */
.gf-node:nth-of-type(1) {
    border-bottom: 3.5px solid var(--color-teal) !important;
    box-shadow: 0 5px 15px rgba(6, 182, 212, 0.15);
}
.gf-node:nth-of-type(1) .gf-icon {
    color: var(--color-teal) !important;
    background: rgba(6, 182, 212, 0.08) !important;
}

.gf-node:nth-of-type(3) {
    border-bottom: 3.5px solid var(--color-orange) !important;
    box-shadow: 0 5px 15px rgba(249, 115, 22, 0.15);
}
.gf-node:nth-of-type(3) .gf-icon {
    color: var(--color-orange) !important;
    background: rgba(249, 115, 22, 0.08) !important;
}

.gf-node:nth-of-type(5) {
    border-bottom: 3.5px solid #eab308 !important;
    box-shadow: 0 5px 15px rgba(234, 179, 8, 0.15);
}
.gf-node:nth-of-type(5) .gf-icon {
    color: #eab308 !important;
    background: rgba(234, 179, 8, 0.08) !important;
}

.gf-node:nth-of-type(7) {
    border-bottom: 3.5px solid var(--color-green) !important;
    box-shadow: 0 5px 15px rgba(16, 185, 129, 0.15);
}
.gf-node:nth-of-type(7) .gf-icon {
    color: var(--color-green) !important;
    background: rgba(16, 185, 129, 0.08) !important;
}

/* ==========================================
   AI EXPERT BACKGROUND & CARTOON LAYOUTS
   ========================================== */
.ai-ambient-bg {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    z-index: 0;
    pointer-events: none;
    overflow: hidden;

        radial-gradient(circle at 10% 20%, rgba(6, 182, 212, 0.07) 0%, transparent 40%),

        linear-gradient(rgba(6, 182, 212, 0.02) 1.5px, transparent 1.5px),
        linear-gradient(90deg, rgba(6, 182, 212, 0.02) 1.5px, transparent 1.5px);
    background-size: 100% 100%, 100% 100%, 45px 45px, 45px 45px;
    animation: backgroundPulse 12s infinite alternate ease-in-out;
}

@keyframes backgroundPulse {
    0% {
        background-position: 0% 0%, 0% 0%, 0px 0px, 0px 0px;
    }
    100% {
        background-position: 10px -10px, -10px 10px, 0px 0px, 0px 0px;
    }
}

/* ==========================================

   ========================================== */
body.presentation-mode {
    background-color: #030712 !important;
}

body.presentation-mode .app-header,
body.presentation-mode .progress-bar-container,
body.presentation-mode .app-footer,
body.presentation-mode .sidebar-nav,
body.presentation-mode .teacher-notes-drawer {
    display: none !important;
}

body.presentation-mode .presentation-container {
    height: 100vh !important;
    width: 100vw !important;
    max-height: 100vh !important;
    max-width: 100vw !important;
    padding: 0 !important;
    margin: 0 !important;
    flex: 1;
}

body.presentation-mode .slide-content {
    width: 1200px !important;
    height: 675px !important;
    max-height: none !important;
    max-width: none !important;
    box-shadow: none !important;
    border: none !important;
}

/* Floating Navigation Controls */
.presentation-controls {
    display: none;
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(13, 21, 37, 0.92);
    border: 1px solid rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(12px);
    border-radius: 30px;
    padding: 8px 16px;
    align-items: center;
    gap: 12px;
    z-index: 99999;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
    opacity: 0;
    transition: opacity 0.35s cubic-bezier(0.25, 0.8, 0.25, 1);
    pointer-events: none;
}

body.presentation-mode .presentation-controls {
    display: flex;
}

/* Show controls when mouse is active */
body.presentation-mode.show-controls .presentation-controls {
    opacity: 1;
    pointer-events: auto;
}

.presentation-controls button {
    background: transparent;
    border: none;
    color: #f8fafc;
    font-size: 1.1rem;
    cursor: pointer;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: var(--transition-fast);
}

.presentation-controls button:hover {
    background: rgba(255, 255, 255, 0.1);
    color: var(--color-teal);
}

.presentation-controls .presentation-slide-num {
    color: #cbd5e1;
    font-family: var(--font-heading);
    font-size: 0.95rem;
    font-weight: 600;
    min-width: 60px;
    text-align: center;
    user-select: none;
}

.presentation-controls .pres-divider {
    width: 1px;
    height: 20px;
    background: rgba(255, 255, 255, 0.15);
    margin: 0 4px;
}

.presentation-controls button.btn-exit-presentation {
    color: #f87171;
}

.presentation-controls button.btn-exit-presentation:hover {
    background: rgba(248, 113, 113, 0.15);
    color: #ef4444;
}

    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;

.sorting-column {

    font-weight: 600;

/* Interactive Checkboxes */
.checklist-interactive {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: 100%;
}

.checkbox-container {
    display: flex;
    align-items: center;
    position: relative;
    padding-left: 32px;
    cursor: pointer;
    font-size: 0.85rem;
    user-select: none;
    text-align: left;
    line-height: 1.4;
    color: #cbd5e1;
}

.checkbox-container input {
    position: absolute;
    opacity: 0;
    cursor: pointer;
    height: 0;
    width: 0;
}

.checkmark {
    position: absolute;
    top: 0;
    left: 0;
    height: 20px;
    width: 20px;
    background-color: rgba(13, 21, 37, 0.85);
    border: 1.5px solid rgba(255, 255, 255, 0.15);
    border-radius: 6px;
    transition: var(--transition-fast);
}

.checkbox-container:hover input ~ .checkmark {
    border-color: var(--color-teal);
    background-color: rgba(6, 182, 212, 0.04);
}

.checkbox-container input:checked ~ .checkmark {
    background-color: var(--color-teal);
    border-color: var(--color-teal);
    box-shadow: 0 0 8px var(--color-teal-glow);
}

.checkmark::after {
    content: "";
    position: absolute;
    display: none;
}

.checkbox-container input:checked ~ .checkmark::after {
    display: block;
}

.checkbox-container .checkmark::after {
    left: 6px;
    top: 2px;
    width: 5px;
    height: 10px;
    border: solid white;
    border-width: 0 2px 2px 0;
    transform: rotate(45deg);
}

/* Animations & Keyframes */
@keyframes scanLaser {
    0%, 100% { top: 0; }
    50% { top: 100%; }
}

@keyframes scanLaserVertical {
    0%, 100% { top: 0; opacity: 0.3; }
    50% { top: 100%; opacity: 1; }
}

@keyframes pulseGlow {
    0% { opacity: 0.4; transform: scale(0.98); }
    100% { opacity: 1; transform: scale(1.02); }
}

@keyframes rotateCw {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

@keyframes rotateCcw {
    0% { transform: rotate(360deg); }
    100% { transform: rotate(0deg); }
}

@keyframes blinkText {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 1; }
}

@keyframes videoGlitch {
    0%, 100% { transform: scale(1) skewX(0deg); filter: hue-rotate(0deg); }
    10% { transform: scale(1.02) skewX(1deg); filter: hue-rotate(10deg); }
    20% { transform: scale(0.98) skewX(-1deg); }
    30% { transform: scale(1) skewX(0deg); }
}

@keyframes dashWave {
    0% { stroke-dashoffset: 1000; }
    100% { stroke-dashoffset: 0; }
}

    jumpTotalSlidesDisp.textContent = totalSlides;
}

// ==========================================
// UTILITY FUNCTIONS
// ==========================================
function getFlowIcon(node) {
    const name = node.toLowerCase();
    if (name.includes('nghĩ')) return 'fa-lightbulb';
    if (name.includes('hỏi')) return 'fa-circle-question';
    if (name.includes('kiểm')) return 'fa-shield-halved';
    if (name.includes('làm')) return 'fa-arrows-rotate';
    return 'fa-check';
}

// ==========================================
// DYNAMIC SLIDE RENDERING ENGINE
// ==========================================
function renderSlide(index) {
    if (index < 0 || index >= totalSlides) return;
    
    const slide = slidesData[index];
    slideViewer.innerHTML = ''; // Clear container
    
    let slideHtml = '';
    
    // Switch between layout types
    switch (slide.type) {
        case 'welcome':
            slideHtml = `

                        <div class="welcome-text-side">

function initSlideInteractions(slide) {

    if (slide.type === 'welcome') {
        initMatrixRain();
    }

    // 1. Initialize Workspace Timer if slide has one
    if (slide.type === 'act-workspace' && slide.duration) {
        initTimerState(slide.id, slide.duration);
    }
    
    // 2. Setup cells on matrix table results (STAGE-04-ACT-04) - Pre-filled
    if (slide.workspaceType === 'matrix-table-results') {
        const matrixContainer = slideViewer.querySelector('.matrix-grid');
        matrixContainer.innerHTML = `
            <div class="matrix-row hdr">
                <div>Bước cốt lõi</div>
                <div>Vai trò / Giá trị học tập</div>

            ${slide.matrixResults.map(res => `
                <div class="matrix-row">
                    <div class="matrix-cell-label" contenteditable="true">${res.step}</div>

                    <div class="matrix-cell-content" contenteditable="true" style="color:var(--color-orange);">${res.skip}</div>
                </div>
            `).join('')}
        `;
    }
    
    // 3. Setup sign button and confetti for graduation (END-05)
    if (slide.type === 'action-commitment-end') {
        const signBtn = document.getElementById('btn-sign-cert');
        if (signBtn) {
            signBtn.addEventListener('click', triggerGraduationConfetti);
        }
    }

    // 4. Setup card-sorting restoration
    if (slide.workspaceType === 'card-sorting') {
        restoreCardSortingState(slide.id);
    }
    
    // 5. Setup commitment-checklist restoration
    if (slide.workspaceType === 'commitment-checklist' || slide.type === 'action-commitment-end') {
        restoreCheckboxState(slide.id);
    }
}

function initMatrixRain() {
    const canvas = document.getElementById('matrix-canvas');
    if (!canvas) return;
    
    const ctx = canvas.getContext('2d');
    const parent = canvas.parentElement;
    canvas.width = parent.clientWidth || 1200;
    canvas.height = parent.clientHeight || 675;
    
    const fontSize = 14;
    const columns = Math.floor(canvas.width / fontSize);
    const yPositions = Array(columns).fill(0);
    
    if (matrixIntervalId) {
        clearInterval(matrixIntervalId);
    }
    
    ctx.fillStyle = '#080c14';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    matrixIntervalId = setInterval(() => {
        ctx.fillStyle = 'rgba(8, 12, 20, 0.08)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.fillStyle = 'rgba(0, 240, 255, 0.35)'; // Cyan Blue Matrix rain
        ctx.font = `${fontSize}px monospace`;
        
        for (let i = 0; i < yPositions.length; i++) {
            const text = String.fromCharCode(33 + Math.random() * 93);
            const x = i * fontSize;
            const y = yPositions[i];
            
            ctx.fillText(text, x, y);
            
            if (y > canvas.height && Math.random() > 0.975) {
                yPositions[i] = 0;
            } else {
                yPositions[i] = y + fontSize;
            }
        }
    }, 50);
}

// Timer sub-logic
function initTimerState(slideId, initialDuration) {
    if (!timerStates[slideId]) {
        // Load custom duration from localStorage if saved
        const savedDurations = JSON.parse(localStorage.getItem('slideTimerDurations') || '{}');
        const duration = savedDurations[slideId] !== undefined ? savedDurations[slideId] : initialDuration;
        
        timerStates[slideId] = {
            remainingTime: duration,
            intervalId: null
        };
    }
    updateTimerDisplay(slideId);
}

function updateTimerDisplay(slideId) {
    const state = timerStates[slideId];
    const display = document.getElementById(`timer-display-${slideId}`);
    if (display && state) {
        const mins = Math.floor(state.remainingTime / 60);
        const secs = state.remainingTime % 60;
        display.textContent = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
    }
}

window.startWorkspaceTimer = function(slideId) {
    const state = timerStates[slideId];
    const timerWidget = document.getElementById(`timer-widget-${slideId}`);
    const display = document.getElementById(`timer-display-${slideId}`);
    
    if (!state || state.intervalId) return; // Already running or not init
    
    timerWidget.classList.add('timer-running');
    state.intervalId = setInterval(() => {
        state.remainingTime--;
        updateTimerDisplay(slideId);
        
        if (state.remainingTime <= 0) {
            clearInterval(state.intervalId);
            state.intervalId = null;
            timerWidget.classList.remove('timer-running');
            timerWidget.classList.add('timer-finished');
            display.style.color = '#ef4444';
            display.classList.add('blink-text');
        }
    }, 1000);
};

window.pauseWorkspaceTimer = function(slideId) {
    const state = timerStates[slideId];
    const timerWidget = document.getElementById(`timer-widget-${slideId}`);
    if (state && state.intervalId) {
        clearInterval(state.intervalId);
        state.intervalId = null;
        timerWidget.classList.remove('timer-running');
    }
};

window.resetWorkspaceTimer = function(slideId, initialDuration) {
    const state = timerStates[slideId];
    const timerWidget = document.getElementById(`timer-widget-${slideId}`);
    const display = document.getElementById(`timer-display-${slideId}`);
    
    if (state) {
        clearInterval(state.intervalId);
        state.intervalId = null;
        
        // Load custom duration from localStorage if saved
        const savedDurations = JSON.parse(localStorage.getItem('slideTimerDurations') || '{}');
        const duration = savedDurations[slideId] !== undefined ? savedDurations[slideId] : initialDuration;
        
        state.remainingTime = duration;
        updateTimerDisplay(slideId);
        
        timerWidget.classList.remove('timer-running', 'timer-finished');
        if (display) {
            display.style.color = '';
            display.classList.remove('blink-text');
        }
    }
};

window.updateTimerDurationFromElement = function(slideId) {
    const display = document.getElementById(`timer-display-${slideId}`);
    if (!display) return;
    
    const text = display.textContent.trim();
    let seconds = 0;
    
    if (text.includes(':')) {
        const parts = text.split(':');
        const mins = parseInt(parts[0] || 0);
        const secs = parseInt(parts[1] || 0);
        seconds = mins * 60 + secs;
    } else {
        const mins = parseInt(text || 0);
        seconds = mins * 60;
    }
    
    if (isNaN(seconds) || seconds <= 0) {
        // Fallback to slide default
        const slide = slidesData.find(s => s.id === slideId);
        seconds = slide ? (slide.duration || 60) : 60;
    }
    
    if (!timerStates[slideId]) {
        timerStates[slideId] = {};
    }
    timerStates[slideId].remainingTime = seconds;
    
    const savedDurations = JSON.parse(localStorage.getItem('slideTimerDurations') || '{}');
    savedDurations[slideId] = seconds;
    localStorage.setItem('slideTimerDurations', JSON.stringify(savedDurations));
    
    updateTimerDisplay(slideId);
};

// Presentation Mode core logic
function togglePresentationMode(on) {
    isPresentationMode = on;
    if (on) {
        document.body.classList.add('presentation-mode');
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen().catch(() => {});
        }
        showPresentationControlsTemporarily();
    } else {
        document.body.classList.remove('presentation-mode');
        document.body.classList.remove('show-controls');
        if (presentationMouseMoveTimeout) {
            clearTimeout(presentationMouseMoveTimeout);
        }
        if (document.fullscreenElement) {
            document.exitFullscreen().catch(() => {});
        }
    }
    adjustSlideScale();
    setTimeout(adjustSlideScale, 100);
    setTimeout(adjustSlideScale, 300);
}

function showPresentationControlsTemporarily() {
    if (!isPresentationMode) return;
    document.body.classList.add('show-controls');
    if (presentationMouseMoveTimeout) {
        clearTimeout(presentationMouseMoveTimeout);
    }
    presentationMouseMoveTimeout = setTimeout(() => {
        if (isPresentationMode) {
            document.body.classList.remove('show-controls');
        }
    }, 3000);
}

// Mouse tracking for auto-hiding presentation control bar
document.addEventListener('mousemove', (e) => {
    if (!isPresentationMode) return;
    
    // Always show controls if mouse is near bottom of screen
    if (e.clientY > window.innerHeight - 80) {
        document.body.classList.add('show-controls');
        if (presentationMouseMoveTimeout) {
            clearTimeout(presentationMouseMoveTimeout);
        }
    } else {
        showPresentationControlsTemporarily();
    }
});

// Keyboard Navigation Bindings
document.addEventListener('keydown', (e) => {
    if (e.target.getAttribute('contenteditable') === 'true' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT') return;

    if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'Enter') {
        e.preventDefault();
        if (currentSlideIndex < totalSlides - 1) goToSlide(currentSlideIndex + 1);
    } else if (e.key === 'ArrowLeft' || e.key === 'Backspace') {
        e.preventDefault();
        if (currentSlideIndex > 0) goToSlide(currentSlideIndex - 1);
    } else if (e.key.toLowerCase() === 't') {
        e.preventDefault();
        notesDrawer.classList.toggle('open');
        toggleNotesBtn.classList.toggle('active');
    } else if (e.key.toLowerCase() === 'm') {
        e.preventDefault();
        sidebar.classList.toggle('open');
    } else if (e.key === 'F5') {
        e.preventDefault();
        togglePresentationMode(!isPresentationMode);
    } else if (e.key === 'Escape') {
        if (isPresentationMode) {
            e.preventDefault();
            togglePresentationMode(false);
        }
    }
});

// Load from inlined serverSavedState if available (compiled standalone mode)

            localStorage.setItem('slideTimerDurations', JSON.stringify(serverSavedState.slideTimerDurations));
        }
    } catch (e) {
        console.error("Failed to load inlined serverSavedState:", e);
    }
}

// Try to load savedState.json asynchronously from server (to sync edits from other devices / git)
if (window.location.protocol.startsWith('http')) {
    fetch('/savedState.json')
        .then(res => {
            if (res.ok) return res.json();
            throw new Error("No saved state on server");
        })
        .then(state => {
            if (state) {
                if (state.slideObjectOffsets) {
                    Object.assign(slideObjectOffsets, state.slideObjectOffsets);
                    localStorage.setItem('slideObjectOffsets', JSON.stringify(slideObjectOffsets));
                }
                if (state.slideTextEdits) {
                    Object.assign(slideTextEdits, state.slideTextEdits);
                    localStorage.setItem('slideTextEdits', JSON.stringify(slideTextEdits));
                }
                if (state.slideHiddenElements) {
                    Object.assign(slideHiddenElements, state.slideHiddenElements);
                    localStorage.setItem('slideHiddenElements', JSON.stringify(slideHiddenElements));
                }
                if (state.slideSortingState) {
                    localStorage.setItem('slideSortingState', JSON.stringify(state.slideSortingState));
                }
                if (state.slideCheckboxStates) {
                    localStorage.setItem('slideCheckboxStates', JSON.stringify(state.slideCheckboxStates));
                }
                if (state.slideTimerDurations) {
                    localStorage.setItem('slideTimerDurations', JSON.stringify(state.slideTimerDurations));
                }
                // Re-render current slide to apply synced state
                goToSlide(currentSlideIndex);
            }
        })
        .catch(err => {
            console.log("Using browser local storage state:", err.message);
        });
}

function initDesignMode() {
    const toggleDesignBtn = document.getElementById('toggle-design-btn');
    const resetSlideBtn = document.getElementById('reset-slide-btn');
    if (!toggleDesignBtn) return;
    
    toggleDesignBtn.addEventListener('click', () => {
        designModeActive = !designModeActive;
        if (designModeActive) {
            document.body.classList.add('design-mode');
            toggleDesignBtn.classList.add('design-active');
        } else {
            document.body.classList.remove('design-mode');
            toggleDesignBtn.classList.remove('design-active');
        }
    });
    
    if (resetSlideBtn) {
        resetSlideBtn.addEventListener('click', () => {
            const currentSlide = slidesData[currentSlideIndex];
            if (!currentSlide) return;
            
            const slideId = currentSlide.id;
            
            if (confirm("Bạn có chắc chắn muốn khôi phục slide này về thiết kế mặc định ban đầu không?")) {
                // Clear offset coordinates for this slide
                if (slideObjectOffsets[slideId]) {
                    delete slideObjectOffsets[slideId];
                }
                
                // Clear text edits for this slide
                if (slideTextEdits[slideId]) {
                    delete slideTextEdits[slideId];
                }
                
                // Clear sorting state for this slide
                const sortingState = JSON.parse(localStorage.getItem('slideSortingState') || '{}');
                if (sortingState[slideId]) {
                    delete sortingState[slideId];
                    localStorage.setItem('slideSortingState', JSON.stringify(sortingState));
                }
                
                // Clear checkbox state for this slide
                const checkboxStates = JSON.parse(localStorage.getItem('slideCheckboxStates') || '{}');
                if (checkboxStates[slideId]) {
                    delete checkboxStates[slideId];
                    localStorage.setItem('slideCheckboxStates', JSON.stringify(checkboxStates));
                }
                
                // Clear hidden elements for this slide
                if (slideHiddenElements[slideId]) {
                    delete slideHiddenElements[slideId];
                    localStorage.setItem('slideHiddenElements', JSON.stringify(slideHiddenElements));
                }
                
                // Clear custom timer durations for this slide
                const timerDurations = JSON.parse(localStorage.getItem('slideTimerDurations') || '{}');
                if (timerDurations[slideId]) {
                    delete timerDurations[slideId];
                    localStorage.setItem('slideTimerDurations', JSON.stringify(timerDurations));
                }
                
                // Save to localStorage
                localStorage.setItem('slideObjectOffsets', JSON.stringify(slideObjectOffsets));
                localStorage.setItem('slideTextEdits', JSON.stringify(slideTextEdits));
                
                // Reload current slide
                goToSlide(currentSlideIndex);
            }
        });
    }
    
    // Alt + D hotkey for quick design mode toggle
    document.addEventListener('keydown', (e) => {
        if (e.altKey && e.key.toLowerCase() === 'd') {
            e.preventDefault();
            toggleDesignBtn.click();
        }
    });
}

function adjustSlideScale() {
    const slideContent = document.querySelector('.slide-content');
    if (!slideContent) return;
    
    const container = document.getElementById('slide-viewer');
    if (!container) return;
    
    const containerWidth = container.clientWidth;
    const containerHeight = container.clientHeight;
    
    const baseWidth = 1200;
    const baseHeight = 675;
    
    const scaleX = containerWidth / baseWidth;
    const scaleY = containerHeight / baseHeight;
    const scale = Math.min(scaleX, scaleY);
    
    slideContent.setAttribute('data-scale-factor', scale);
    
    slideContent.style.width = baseWidth + 'px';
    slideContent.style.height = baseHeight + 'px';
    slideContent.style.position = 'absolute';
    slideContent.style.left = '50%';
    slideContent.style.top = '50%';
    slideContent.style.transform = `translate(-50%, -50%) scale(${scale})`;
    slideContent.style.transformOrigin = 'center center';
    slideContent.style.overflow = 'visible';
}

window.addEventListener('resize', adjustSlideScale);
document.addEventListener('fullscreenchange', adjustSlideScale);

        '.bq-tag', '.bq-text', '.bq-sub', '.bq-visual-graphic', '.bq-wrapper',

        '.scanner-portal-widget', '.circuits-brain-vs-ai', '.dashboard-grid', '.db-panel', '.db-panels-right',
